<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>문서 인덱스</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 2.5rem 1.5rem; line-height: 1.5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    background: #f6f7f9; color: #1a1a1a;
  }
  .wrap { max-width: 920px; margin: 0 auto; }
  header { margin-bottom: 2rem; }
  h1 { font-size: 1.6rem; margin: 0 0 .3rem; }
  .sub { color: #6b7280; font-size: .9rem; }
  .cat { margin-top: 2rem; }
  h2 { font-size: 1.05rem; margin: 0 0 .8rem; display: flex; align-items: center; gap: .5rem; }
  .count { font-size: .7rem; font-weight: 600; color: #6b7280; background: rgba(0,0,0,.06); padding: .1rem .5rem; border-radius: 999px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: .75rem; }
  .card {
    display: flex; flex-direction: column; gap: .3rem; text-decoration: none;
    padding: .9rem 1rem; border-radius: 10px; background: #fff;
    border: 1px solid rgba(0,0,0,.08); transition: border-color .15s, transform .15s;
  }
  .card:hover { border-color: #6366f1; transform: translateY(-1px); }
  .card-title { font-weight: 600; color: #111827; }
  .card-path { font-size: .72rem; color: #9ca3af; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; }
  .empty { color: #6b7280; }
  @media (prefers-color-scheme: dark) {
    body { background: #0f1115; color: #e5e7eb; }
    .sub, .count, .card-path { color: #9ca3af; }
    .count { background: rgba(255,255,255,.08); }
    .card { background: #181b21; border-color: rgba(255,255,255,.08); }
    .card-title { color: #f3f4f6; }
    .empty { color: #9ca3af; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>문서 인덱스</h1>
      <div class="sub">기획 · 와이어프레임 · 이슈 · 도메인 · 아키텍처 문서 (총 3건)</div>
    </header>
    <main>
      <section class="cat">
        <h2>기획서 <span class="count">1</span></h2>
        <div class="grid">
          <a class="card" href="plans/notification-feature.html">
            <span class="card-title">알림 기능 기획</span>
            <span class="card-path">plans/notification-feature.html</span>
          </a>
        </div>
      </section>
      <section class="cat">
        <h2>와이어프레임 <span class="count">1</span></h2>
        <div class="grid">
          <a class="card" href="wireframes/notification-feature.html">
            <span class="card-title">알림 기능 와이어프레임</span>
            <span class="card-path">wireframes/notification-feature.html</span>
          </a>
        </div>
      </section>
      <section class="cat">
        <h2>이슈 <span class="count">1</span></h2>
        <div class="grid">
          <a class="card" href="issues/notification-feature.html">
            <span class="card-title">알림 기능 이슈 목록</span>
            <span class="card-path">issues/notification-feature.html</span>
          </a>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
